{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - BMV3 CDC</title>
    <link rel="icon" type="image/png" href="{% static 'core/image/bmv3_logo.png' %}">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #ffffff;
            text-align: center;
        }
        .container {
            max-width: 500px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            margin: 20px;
        }
        .logo {
            height: 100px;
            margin-bottom: 25px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
        }
        .icon {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }
        h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 15px;
            color: #8FB977;
        }
        p {
            font-size: 1rem;
            line-height: 1.6;
            color: #e0e0e0;
            margin-bottom: 30px;
        }
        .retry-btn {
            background-color: #8FB977;
            color: #0f2027;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(143, 185, 119, 0.4);
        }
        .retry-btn:hover {
            background-color: #a3d18a;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(143, 185, 119, 0.6);
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <img class="logo" src="{% static 'core/image/bmv3_logo.png' %}" alt="BMV3 Logo">
        <div class="icon">📶</div>
        <h1>You are Offline</h1>
        <p>It seems you are not connected to the internet. Please check your network connection and try again to access the BMV3 Child Care Management System.</p>
        <button class="retry-btn" onclick="window.location.reload()">Retry Connection</button>
    </div>
</body>
</html>
